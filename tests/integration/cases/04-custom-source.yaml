name: custom-source-updates-record
setup:
  create_records:
    - zone_id: ${SCRU_INTEGRATION_ZONE_NAME}
      name: ${SCRU_INTEGRATION_RECORD_NAME}
      content: ${SCRU_INTEGRATION_INITIAL_IP}
      proxied: false
      ttl: 1
config_yaml: |
  records:
    - zone_id: ${SCRU_INTEGRATION_ZONE_NAME}
      name: ${SCRU_INTEGRATION_RECORD_NAME}
      source:
        type: custom
        command: '${SCRU_INTEGRATION_CUSTOM_COMMAND}'
      proxied: false
