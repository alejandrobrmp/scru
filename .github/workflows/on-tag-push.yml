name: On Tag Push

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build:
    uses: ./.github/workflows/reusable-build.yml

  unit-tests:
    needs: build
    uses: ./.github/workflows/reusable-unit-tests.yml

  release:
    needs: unit-tests
    uses: ./.github/workflows/reusable-release.yml
    with:
      tag-name: ${{ github.ref_name }}
