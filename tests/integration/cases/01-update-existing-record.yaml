name: update-existing-record
setup:
  create_records:
    - zone_id: ${SCRU_INTEGRATION_ZONE_NAME}
      name: ${SCRU_INTEGRATION_RECORD_NAME}
      content: ${SCRU_INTEGRATION_INITIAL_IP}
      proxied: false
      ttl: 1
config_yaml: |
  records:
    - zone_id: ${SCRU_INTEGRATION_ZONE_NAME}
      name: ${SCRU_INTEGRATION_RECORD_NAME}
      source:
        type: fixed
        value: ${SCRU_INTEGRATION_TARGET_IP}
      proxied: false
